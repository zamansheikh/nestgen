version: 0.3.0
repository: https://github.com/zamansheikh/nestgen
homepage: https://github.com/zamansheikh/nestgen
issue_tracker: https://github.com/zamansheikh/nestgen/issues
funding:
  - https://ko-fi.com/zamansheikh
